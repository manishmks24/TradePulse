<div class="login-container">
  <div class="glass-card login-card">
    <div class="login-header">
      <div class="brand-logo"></div>
      <h2>Create an Account</h2>
      <p>Join us to start your trading journey</p>
    </div>
    
    <form class="login-form" (ngSubmit)="onSignup()">
      <div class="input-group">
        <label for="fullName">Full Name</label>
        <div class="input-wrapper">
          <input type="text" id="fullName" name="fullName" [(ngModel)]="fullName" placeholder="Enter your full name" required>
        </div>
      </div>

      <div class="input-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="Enter your email" required>
        </div>
      </div>

      <div class="input-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <input type="text" id="username" name="username" [(ngModel)]="username" placeholder="Choose a username" required>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="••••••••" required>
        </div>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button type="submit" class="submit-btn" [disabled]="!username || !password || !email || !fullName || isLoading">
        <span *ngIf="!isLoading">Sign Up</span>
        <span *ngIf="isLoading">Creating account...</span>
      </button>
    </form>
    
    <div class="login-footer">
      <p>Already have an account? <a routerLink="/login">Log in</a></p>
    </div>
  </div>
</div>
