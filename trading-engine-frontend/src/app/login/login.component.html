<div class="login-container">
  <div class="glass-card login-card">
    <div class="login-header">
      <div class="brand-logo"></div>
      <h2>Welcome Back</h2>
      <p>Log in to access your trading dashboard</p>
    </div>
    
    <form class="login-form" (ngSubmit)="onLogin()">
      <div class="input-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <input type="text" id="username" name="username" [(ngModel)]="username" placeholder="Enter your username" required>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="••••••••" required>
        </div>
      </div>

      <div class="form-actions">
        <label class="remember-me">
          <input type="checkbox">
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="submit-btn" [disabled]="!username || !password">
        Sign In
      </button>
    </form>
    
    <div class="login-footer">
      <p>Don't have an account? <a href="#">Sign up</a></p>
    </div>
  </div>
</div>
